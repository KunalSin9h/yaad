version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-blank: false   # fmt.Scanln in CLI prompts intentionally ignored

issues:
  exclude-rules:
    # Test files are allowed to have unused functions and looser error handling.
    - path: "_test\\.go"
      linters: [errcheck]
