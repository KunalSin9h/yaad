<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>

    <radialGradient id="headGrad" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#252E3F"/>
      <stop offset="100%" stop-color="#1A2233"/>
    </radialGradient>

    <radialGradient id="irisL" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>

    <radialGradient id="irisR" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>

    <filter id="eyeglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="200" height="200" rx="38" fill="url(#bg)"/>
  <rect width="200" height="200" rx="38" fill="none"
        stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.06"/>

  <!-- ── Ear tufts ──────────────────────────────────────── -->
  <!-- Left ear: rises up-left from the head -->
  <polygon points="56,56  42,18  76,44"
           fill="#1A2233" stroke="#E6EDF3" stroke-width="1"
           stroke-opacity="0.12" stroke-linejoin="round"/>
  <!-- Right ear: mirror -->
  <polygon points="144,56  124,44  158,18"
           fill="#1A2233" stroke="#E6EDF3" stroke-width="1"
           stroke-opacity="0.12" stroke-linejoin="round"/>

  <!-- ── Head ──────────────────────────────────────────── -->
  <circle cx="100" cy="110" r="68" fill="url(#headGrad)"/>
  <!-- Subtle head rim -->
  <circle cx="100" cy="110" r="68" fill="none"
          stroke="#E6EDF3" stroke-width="1" stroke-opacity="0.09"/>

  <!-- ── Facial disc ───────────────────────────────────── -->
  <!-- Dark oval inset = classic owl face mask -->
  <ellipse cx="100" cy="108" rx="49" ry="46" fill="#0D1117" fill-opacity="0.88"/>

  <!-- ── Eyes ─────────────────────────────────────────── -->
  <!-- Outer eye glow halo (ambient light) -->
  <circle cx="75"  cy="98" r="24" fill="#6366F1" fill-opacity="0.18" filter="url(#eyeglow)"/>
  <circle cx="125" cy="98" r="24" fill="#6366F1" fill-opacity="0.18" filter="url(#eyeglow)"/>

  <!-- Eye sclera ring (off-white) -->
  <circle cx="75"  cy="98" r="22" fill="#D1D8E4"/>
  <circle cx="125" cy="98" r="22" fill="#D1D8E4"/>

  <!-- Iris -->
  <circle cx="75"  cy="98" r="16" fill="url(#irisL)"/>
  <circle cx="125" cy="98" r="16" fill="url(#irisR)"/>

  <!-- Inner iris ring detail -->
  <circle cx="75"  cy="98" r="16" fill="none" stroke="#6366F1" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="125" cy="98" r="16" fill="none" stroke="#6366F1" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Pupil -->
  <circle cx="75"  cy="98" r="8.5" fill="#0D1117"/>
  <circle cx="125" cy="98" r="8.5" fill="#0D1117"/>

  <!-- Shine — small offset highlight gives depth -->
  <circle cx="80"  cy="92" r="3.5" fill="#ffffff" fill-opacity="0.9" filter="url(#subtleglow)"/>
  <circle cx="130" cy="92" r="3.5" fill="#ffffff" fill-opacity="0.9" filter="url(#subtleglow)"/>

  <!-- ── Beak ──────────────────────────────────────────── -->
  <!-- Small downward triangle centred between eyes -->
  <polygon points="93,120  107,120  100,136"
           fill="#C8D0DC" fill-opacity="0.75"/>

  <!-- ── Chest feather hint ───────────────────────────── -->
  <!-- Three soft arcs at bottom of disc, suggesting layered feathers -->
  <path d="M 72 148 Q 100 138 128 148" stroke="#E6EDF3" stroke-width="1.5"
        stroke-opacity="0.18" fill="none" stroke-linecap="round"/>
  <path d="M 80 156 Q 100 147 120 156" stroke="#E6EDF3" stroke-width="1.5"
        stroke-opacity="0.13" fill="none" stroke-linecap="round"/>
</svg>
